<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فلاحي الذكي 🌱 | Smart Farmer AI</title>
    
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>

    <style>
        :root {
            --primary-bg: radial-gradient(circle at top right, #3e0a3e, #1f0131, #0d3b1e);
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --accent: #a5ffa5;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--primary-bg);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            color: white; overflow: hidden;
        }

        .app-card {
            width: 90%; max-width: 420px;
            background: var(--glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 30px; border: 1px solid var(--border);
            padding: 25px; box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; gap: 20px;
        }

        header h1 { font-size: 1.6rem; margin: 0; color: #dcbfff; text-align: center; }
        header p { font-size: 0.85rem; opacity: 0.8; text-align: center; margin: 5px 0 0; }

        .cam-box {
            position: relative; width: 100%; aspect-ratio: 1;
            border-radius: 20px; overflow: hidden;
            background: #000; border: 1px solid var(--border);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: var(--accent); box-shadow: 0 0 15px var(--accent);
            animation: scan 2.5s ease-in-out infinite; display: none;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .btn-main {
            background: linear-gradient(45deg, #228b22, #32cd32);
            border: none; padding: 16px; border-radius: 18px;
            color: white; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(34,139,34,0.3);
        }

        .btn-main:disabled { background: #555; cursor: wait; }

        #result {
            background: rgba(0,0,0,0.5); border-radius: 18px;
            padding: 15px; font-size: 0.95rem; line-height: 1.6;
            display: none; max-height: 180px; overflow-y: auto;
            text-align: right; border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="app-card">
        <header>
            <h1>فلاحي الذكي 🌱</h1>
            <p>مشروع "فكرة صح" - El Milia</p>
        </header>
        
        <div class="cam-box">
            <video id="video" autoplay playsinline></video>
            <div id="scanner" class="scan-line"></div>
        </div>

        <button id="analyzeBtn" class="btn-main">حلل الحالة الآن</button>
        
        <div id="result"></div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // نستخدم نفس مفتاحك القديم، التغيير سيكون في اسم النموذج
        const API_KEY = "AIzaSyCsjD0q6RaOgEe9jVMLCiwPrPUb9IZbZV4"; 
        const genAI = new GoogleGenerativeAI(API_KEY);
        
        // التعديل الجذري هنا: نستخدم النموذج المستقر gemini-pro-vision المخصص للصور
        const model = genAI.getGenerativeModel({ model: "gemini-pro-vision" });

        const video = document.getElementById('video');
        const btn = document.getElementById('analyzeBtn');
        const resultDiv = document.getElementById('result');
        const scanner = document.getElementById('scanner');

        async function startCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
            } catch (err) {
                resultDiv.style.display = "block";
                resultDiv.innerHTML = "يرجى تفعيل الكاميرا (يجب أن يكون الرابط HTTPS).";
            }
        }

        function getFrame() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            // نحول الصورة إلى Base64، نموذج gemini-pro-vision يحتاجها بهذه الصيغة
            return canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
        }

        btn.onclick = async () => {
            btn.disabled = true; btn.innerText = "جاري التحليل... ⏳";
            scanner.style.display = "block"; resultDiv.style.display = "block";
            resultDiv.innerHTML = "يتم الآن التواصل مع الذكاء الاصطناعي (Stable API)...";

            try {
                const imageData = getFrame();
                const prompt = "أنت خبير فلاحي جزائري. حلل النبتة في الصورة. إذا لم تكن نباتاً، رد بـ NOT_A_PLANT. إذا كانت نباتاً، شخص الحالة وأعطِ العلاج باللهجة الجزائرية باختصار.";
                
                // تغيير طريقة الإرسال لتتوافق مع نموذج gemini-pro-vision
                const result = await model.generateContent([
                    prompt,
                    { inlineData: { data: imageData, mimeType: "image/jpeg" } }
                ]);

                const text = result.response.text();

                if (text.includes("NOT_A_PLANT")) {
                    resultDiv.innerHTML = "❌ عذراً! يرجى تصوير النبات فقط.";
                } else {
                    resultDiv.innerHTML = `<b>التحليل:</b><br>${text}`;
                }
            } catch (e) {
                resultDiv.innerHTML = `حدث خطأ: ${e.message}`;
            } finally {
                btn.disabled = false; btn.innerText = "حلل الحالة الآن";
                scanner.style.display = "none";
            }
        };

        startCam();
    </script>
</body>
</html>
