<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فلاحي الذكي 🌱</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #1a0121; color: white; text-align: center; }
        .app { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .screen { display: none; width: 100%; max-width: 400px; }
        .active { display: block; }
        video, img { width: 100%; aspect-ratio: 1; border-radius: 20px; background: #000; object-fit: cover; }
        .btn { background: #28a745; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        #res { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px; margin-top: 15px; text-align: right; }
    </style>
</head>
<body>

    <div class="app">
        <div id="p1" class="screen active">
            <h1>🌱 فلاحي الذكي</h1>
            <p>مشروع "فكرة صح"</p>
            <button class="btn" onclick="go(2)">ابدأ الفحص</button>
        </div>

        <div id="p2" class="screen">
            <video id="v" autoplay playsinline></video>
            <button class="btn" id="run">تحليل الصورة 🔍</button>
        </div>

        <div id="p3" class="screen">
            <h3>النتيجة:</h3>
            <div id="res">جاري التحميل...</div>
            <button class="btn" onclick="location.reload()">فحص جديد</button>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const API_KEY = "AIzaSyC4GEBtdzNq_LQ5-WzFJ_SgdKB-xg8lr-Y";
        const genAI = new GoogleGenerativeAI(API_KEY);
        // نستخدم 1.5-flash ولكن سنتأكد من معالجة الخطأ
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        window.go = (n) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('p'+n).classList.add('active');
            if(n===2) start();
        };

        async function start() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('v').srcObject = s;
            } catch(e) { alert("فشل فتح الكاميرا: " + e.message); }
        }

        document.getElementById('run').onclick = async () => {
            const btn = document.getElementById('run');
            btn.disabled = true; btn.innerText = "جاري الفحص...";
            
            const v = document.getElementById('v');
            const c = document.createElement('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            const base64 = c.toDataURL('image/jpeg', 0.5).split(',')[1];

            go(3);
            try {
                const res = await model.generateContent([
                    "أنت خبير فلاحي جزائري. ما مشكلة هذه النبتة وما الحل؟ باختصار بالدارجة.",
                    { inlineData: { data: base64, mimeType: "image/jpeg" } }
                ]);
                document.getElementById('res').innerText = res.response.text();
            } catch(e) {
                document.getElementById('res').innerText = "حدث خطأ: " + e.message;
            }
        };
    </script>
</body>
</html>
