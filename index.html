<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فلاحي الذكي 🌱 | Smart Farmer AI</title>
    
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>

    <style>
        :root {
            --primary-bg: radial-gradient(circle at top right, #3e0a3e, #1f0131, #0d3b1e);
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --accent: #a5ffa5;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--primary-bg);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            color: white; overflow: hidden;
        }

        .app-card {
            width: 90%; max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 25px; border: 1px solid var(--border);
            padding: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; gap: 15px;
        }

        header h1 { font-size: 1.5rem; margin: 0; color: #dcbfff; text-align: center; }
        header p { font-size: 0.8rem; opacity: 0.7; text-align: center; margin: 5px 0 0; }

        .cam-box {
            position: relative; width: 100%; aspect-ratio: 1;
            border-radius: 15px; overflow: hidden;
            background: #000; border: 1px solid var(--border);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--accent); box-shadow: 0 0 10px var(--accent);
            animation: scan 2s linear infinite; display: none;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .btn-main {
            background: #228b22; border: none; padding: 15px;
            border-radius: 15px; color: white; font-size: 1.1rem;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .btn-main:disabled { background: #555; cursor: not-allowed; }

        #result {
            background: rgba(0,0,0,0.4); border-radius: 15px;
            padding: 15px; font-size: 0.9rem; line-height: 1.5;
            display: none; max-height: 150px; overflow-y: auto;
            text-align: right; border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="app-card">
        <header>
            <h1>فلاحي الذكي 🌱</h1>
            <p>مشروع "فكرة صح" - El Milia</p>
        </header>
        
        <div class="cam-box">
            <video id="video" autoplay playsinline></video>
            <div id="scanner" class="scan-line"></div>
        </div>

        <button id="analyzeBtn" class="btn-main">حلل الحالة الآن</button>
        
        <div id="result"></div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // المفتاح الجديد المباشر
        const API_KEY = "AIzaSyC4GEBtdzNq_LQ5-WzFJ_SgdKB-xg8lr-Y"; 
        
        const genAI = new GoogleGenerativeAI(API_KEY);
        // نستخدم نسخة Flash لأنها الأسرع والأفضل للمشاريع المجانية
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        const video = document.getElementById('video');
        const btn = document.getElementById('analyzeBtn');
        const resultDiv = document.getElementById('result');
        const scanner = document.getElementById('scanner');

        async function startCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch (err) {
                resultDiv.style.display = "block";
                resultDiv.innerHTML = "يرجى تفعيل الكاميرا وتأكد من رابط HTTPS.";
            }
        }

        function getFrame() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            return canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
        }

        btn.onclick = async () => {
            btn.disabled = true; btn.innerText = "جاري التحليل... ⏳";
            scanner.style.display = "block"; resultDiv.style.display = "block";
            resultDiv.innerHTML = "جاري مراجعة الصورة...";

            try {
                const imageData = getFrame();
                const prompt = "أنت خبير فلاحي جزائري. حلل النبتة في الصورة. إذا لم تكن نباتاً، رد بـ NOT_A_PLANT. إذا كانت نباتاً، شخص الحالة وأعطِ الحل باختصار.";
                
                const result = await model.generateContent([
                    prompt, { inlineData: { data: imageData, mimeType: "image/jpeg" } }
                ]);

                const text = result.response.text();
                if (text.includes("NOT_A_PLANT")) {
                    resultDiv.innerHTML = "❌ هذا ليس نباتاً! يرجى تصوير الشجرة فقط.";
                } else {
                    resultDiv.innerHTML = `<b>✅ التحليل:</b><br>${text}`;
                }
            } catch (e) {
                resultDiv.innerHTML = `حدث خطأ: ${e.message}`;
            } finally {
                btn.disabled = false; btn.innerText = "حلل الحالة الآن";
                scanner.style.display = "none";
            }
        };

        startCam();
    </script>
</body>
</html>
