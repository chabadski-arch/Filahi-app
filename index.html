<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فلاحي الذكي 🌱</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #1a0121; color: white; text-align: center; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .app-card { width: 90%; max-width: 400px; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.2); }
        .screen { display: none; } .active { display: block; }
        video { width: 100%; aspect-ratio: 1; border-radius: 15px; background: #000; object-fit: cover; margin-bottom: 15px; }
        .btn { background: #28a745; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1.1rem; }
        #res { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px; margin-top: 15px; text-align: right; line-height: 1.6; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="app-card">
        <div id="p1" class="screen active">
            <h1>🌱 فلاحي الذكي</h1>
            <p>مشروع "فكرة صح" - El Milia</p>
            <button class="btn" onclick="go(2)">ابدأ الفحص الآن</button>
        </div>

        <div id="p2" class="screen">
            <video id="v" autoplay playsinline></video>
            <button class="btn" id="run">تحليل الصورة 🔍</button>
        </div>

        <div id="p3" class="screen">
            <h3>النتيجة النهائية:</h3>
            <div id="res">جاري الاتصال بالسيرفر...</div>
            <button class="btn" style="background:#6c757d; margin-top:10px;" onclick="location.reload()">فحص جديد 🔄</button>
        </div>
    </div>

    <script>
        // المفتاح الجديد الخاص بك
        const KEY = "AIzaSyC4GEBtdzNq_LQ5-WzFJ_SgdKB-xg8lr-Y";

        function go(n) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('p'+n).classList.add('active');
            if(n===2) startCam();
        }

        async function startCam() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('v').srcObject = s;
            } catch(e) { alert("الكاميرا لا تعمل، تأكد من إذن HTTPS"); }
        }

        document.getElementById('run').onclick = async () => {
            const btn = document.getElementById('run');
            btn.disabled = true; btn.innerText = "جاري المعالجة...";
            
            const v = document.getElementById('v');
            const c = document.createElement('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            const base64 = c.toDataURL('image/jpeg', 0.5).split(',')[1];

            go(3);
            const resDiv = document.getElementById('res');

            // إرسال الطلب مباشرة عبر API بدون مكتبات
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "أنت خبير زراعي جزائري. حلل صورة النبتة واذكر المرض والعلاج باختصار بالدارجة." },
                                { inlineData: { mimeType: "image/jpeg", data: base64 } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    resDiv.innerHTML = data.candidates[0].content.parts[0].text;
                } else {
                    resDiv.innerText = "لم يتم التعرف على النتيجة، حاول مرة أخرى.";
                }
            } catch(e) {
                resDiv.innerText = "خطأ في الاتصال بالشبكة: " + e.message;
            } finally {
                btn.disabled = false; btn.innerText = "تحليل الصورة 🔍";
            }
        };
    </script>
</body>
</html>
