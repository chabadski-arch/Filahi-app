<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فلاحي الذكي 🌱 | فكرة صح</title>
    <style>
        :root { --primary: #28a745; --accent: #dcbfff; --bg: radial-gradient(circle at top right, #1f0131, #0d3b1e); --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .app-card { width: 90%; max-width: 400px; height: 85vh; background: var(--glass); backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); padding: 25px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; }
        .page { display: none; flex-direction: column; height: 100%; animation: fadeIn 0.4s ease; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .logo { font-size: 70px; margin-bottom: 15px; }
        .dev-name { font-size: 0.9rem; color: var(--accent); margin-bottom: 5px; }
        .app-name { font-size: 2.2rem; margin: 0; font-weight: bold; }
        .camera-box { width: 100%; aspect-ratio: 1; border-radius: 20px; background: #000; overflow: hidden; margin-bottom: 15px; border: 1px solid var(--glass); }
        video, #img-prev { width: 100%; height: 100%; object-fit: cover; }
        .btn { background: var(--primary); border: none; padding: 16px; border-radius: 15px; color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        #res-display { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 20px; text-align: right; line-height: 1.7; overflow-y: auto; flex: 1; margin-bottom: 15px; border: 1px solid var(--primary); }
    </style>
</head>
<body>
    <div class="app-card">
        <div id="p1" class="page active">
            <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
                <div class="logo">🌱</div>
                <div class="dev-name">المطور: شامخ باديس</div>
                <h1 class="app-name">فلاحي الذكي</h1>
                <p>مشروع "فكرة صح"</p>
                <button class="btn" style="margin-top:20px" onclick="go(2)">ابدأ الفحص</button>
            </div>
            <p style="font-size:0.7rem; opacity:0.5;">© 2026 جميع الحقوق محفوظة</p>
        </div>

        <div id="p2" class="page">
            <h3>صور النبتة 📸</h3>
            <div class="camera-box">
                <video id="v" autoplay playsinline></video>
                <img id="img-prev" style="display:none">
            </div>
            <button class="btn" id="run-btn">تحليل الحالة 🔍</button>
        </div>

        <div id="p3" class="page">
            <h3>النتيجة ✅</h3>
            <div id="res-display">جاري التحليل...</div>
            <button class="btn" onclick="location.reload()">فحص جديد 🔄</button>
        </div>
    </div>

    <script>
        // استخدام المفتاح الذي يعمل حالياً
        const API_KEY = "AIzaSyC4GEBtdzNq_LQ5-WzFJ_SgdKB-xg8lr-Y";
        
        function go(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p'+n).classList.add('active');
            if(n===2) startCamera();
        }

        const video = document.getElementById('v');
        const runBtn = document.getElementById('run-btn');
        const resDiv = document.getElementById('res-display');

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch(e) { alert("الكاميرا لا تعمل"); }
        }

        runBtn.onclick = async () => {
            runBtn.disabled = true; runBtn.innerText = "انتظر قليلاً... 🌱";
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
            go(3);

            try {
                // التغيير الجذري: استخدام gemini-pro-vision المتوافق مع المفتاح
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro-vision:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "أنت خبير فلاحي جزائري. حلل صورة النبتة واذكر المرض والعلاج باختصار بالدارجة." },
                                { inlineData: { mimeType: "image/jpeg", data: base64 } }
                            ]
                        }]
                    })
                });

                const data = await resp.json();
                if (data.candidates && data.candidates[0].content) {
                    resDiv.innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, "<br>");
                } else {
                    resDiv.innerText = "جرب تصوير النبتة من زاوية أوضح.";
                }
            } catch(e) {
                resDiv.innerText = "خطأ: " + e.message;
            } finally {
                runBtn.disabled = false; runBtn.innerText = "تحليل الحالة 🔍";
            }
        };
    </script>
</body>
</html>
