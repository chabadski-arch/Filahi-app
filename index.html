<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فلاحي الذكي 🌱</title>
    <style>
        :root {
            --purple: #3e0a3e;
            --green: #28a745;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: radial-gradient(circle at top right, #1f0131, #0d3b1e); 
            color: white; height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        .app-container {
            width: 90%; max-width: 400px; height: 80vh;
            background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.2);
            padding: 25px; display: flex; flex-direction: column; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .page { display: none; flex-direction: column; height: 100%; animation: fadeIn 0.5s ease; }
        .active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* الصفحة 1: الترحيب */
        .welcome-screen { justify-content: center; align-items: center; text-align: center; }
        .logo { font-size: 80px; margin-bottom: 20px; }
        .welcome-title { font-size: 2rem; margin: 0; color: #dcbfff; }
        .welcome-desc { font-size: 1rem; opacity: 0.8; margin: 15px 0 30px; }

        /* الصفحة 2: الكاميرا */
        .camera-screen { gap: 15px; }
        .viewfinder { width: 100%; aspect-ratio: 1; border-radius: 20px; background: #000; overflow: hidden; position: relative; }
        video, img#preview { width: 100%; height: 100%; object-fit: cover; }
        .hidden-input { display: none; }

        /* الصفحة 3: النتائج */
        .result-screen { text-align: right; }
        .result-box { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 20px; border: 1px solid var(--green); margin-top: 10px; overflow-y: auto; }
        .result-item { margin-bottom: 15px; }
        .result-label { font-weight: bold; color: var(--green); display: block; margin-bottom: 5px; }

        /* الأزرار */
        .btn { 
            background: var(--green); border: none; padding: 16px; border-radius: 15px; 
            color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s;
            margin-top: 10px; text-decoration: none; text-align: center;
        }
        .btn-outline { background: transparent; border: 2px solid white; margin-top: 5px; }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { background: #555; cursor: wait; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="page1" class="page active welcome-screen">
            <div class="logo">🌱</div>
            <h1 class="welcome-title">فلاحي الذكي</h1>
            <p class="welcome-desc">مشروع "فكرة صح" - El Milia<br>شريكك في حماية أشجارك</p>
            <button class="btn" onclick="showPage(2)">ابدأ الآن</button>
        </div>

        <div id="page2" class="page camera-screen">
            <h3>التقط أو ارفع صورة</h3>
            <div class="viewfinder" id="viewfinder">
                <video id="v" autoplay playsinline></video>
                <img id="preview" style="display:none;">
            </div>
            
            <input type="file" id="fileInput" class="hidden-input" accept="image/*">
            <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">📁 رفع صورة من الهاتف</button>
            <button class="btn" id="analyzeBtn">🔍 تحليل الحالة</button>
        </div>

        <div id="page3" class="page result-screen">
            <h3>التشخيص الذكي ✅</h3>
            <div class="result-box" id="resultContent">
                <div class="result-item">
                    <span class="result-label">المرض:</span>
                    <span id="res-disease">جاري الاستخراج...</span>
                </div>
                <div class="result-item">
                    <span class="result-label">السبب:</span>
                    <span id="res-cause">...</span>
                </div>
                <div class="result-item">
                    <span class="result-label">العلاج المقترح:</span>
                    <span id="res-treatment">...</span>
                </div>
            </div>
            <button class="btn btn-outline" onclick="location.reload()">🔄 فحص نبتة أخرى</button>
        </div>

    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const genAI = new GoogleGenerativeAI("AIzaSyC4GEBtdzNq_LQ5-WzFJ_SgdKB-xg8lr-Y");
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        window.showPage = (pageNum) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + pageNum).classList.add('active');
            if(pageNum === 2) startCamera();
        };

        const v = document.getElementById('v');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyzeBtn');

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(s => v.srcObject = s).catch(e => console.log("Camera error"));
        }

        // معالجة رفع الملف
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                v.style.display = 'none';
                preview.src = event.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        };

        analyzeBtn.onclick = async () => {
            analyzeBtn.disabled = true;
            analyzeBtn.innerText = "جاري التحليل... ⏳";

            const canvas = document.createElement('canvas');
            canvas.width = v.videoWidth || preview.naturalWidth;
            canvas.height = v.videoHeight || preview.naturalHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(v.style.display !== 'none' ? v : preview, 0, 0, canvas.width, canvas.height);
            const imgBase64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];

            try {
                const prompt = "حلل صورة النبتة. إذا لم تكن نباتاً، رد بكلمة NOT_A_PLANT. إذا كانت نباتاً، اذكر: 1-المرض، 2-السبب، 3-العلاج. باللهجة الجزائرية وبدون رموز نجمة.";
                const result = await model.generateContent([prompt, { inlineData: { data: imgBase64, mimeType: "image/jpeg" } }]);
                const text = result.response.text();

                if (text.includes("NOT_A_PLANT")) {
                    alert("يرجى تصوير نبتة فقط!");
                    location.reload();
                } else {
                    parseResults(text);
                    showPage(3);
                }
            } catch (e) {
                alert("خطأ في الاتصال: " + e.message);
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerText = "🔍 تحليل الحالة";
            }
        };

        function parseResults(text) {
            // محاولة تقسيم النص بشكل بسيط (يعتمد على ذكاء Gemini في الالتزام بالترتيب)
            const parts = text.split('\n');
            document.getElementById('res-disease').innerText = parts[0] || "غير محدد";
            document.getElementById('res-cause').innerText = parts[1] || "غير محدد";
            document.getElementById('res-treatment').innerText = parts[2] || "اتبع نصائح عامة";
        }
    </script>
</body>
</html>
